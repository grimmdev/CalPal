version: "3.7"
name: calpal
services:
  calpal:
    container_name: calpal
    image: ghcr.io/grimmdev/calpal:1.0.0
    ports:
      - target: 8080
        published: "8080"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/data
        target: /app/data
      - type: bind
        source: /DATA/AppData/$AppID/templates
        target: /app/templates
    environment:
      - PORT=8080
      - BASE_URL=http://localhost:8080
      - SMTP_HOST=
      - SMTP_PORT=587
      - SMTP_USER=
      - SMTP_PASS=
      - SMTP_FROM=
      - GOOGLE_CLIENT_ID=
      - GOOGLE_CLIENT_SECRET=
      - MICROSOFT_CLIENT_ID=
      - MICROSOFT_CLIENT_SECRET=
      - MICROSOFT_TENANT_ID=common
    network_mode: bridge
    privileged: false
    x-casaos:
      ports:
        - container: "8080"
          description:
            en_us: WebUI HTTP Port
      volumes:
        - container: /app/data
          description:
            en_us: Data directory for SQLite database.
        - container: /app/templates
          description:
            en_us: Templates directory for custom emails.

x-casaos:
  architectures:
    - amd64
    - arm64
  main: calpal
  author: grimmdev
  category: Productivity
  description:
    en_us: CalPal is a fast, self-hosted, and lightweight scheduling alternative with zero external dependencies. Built with Go and SQLite, it requires no heavy external databases and deploys instantly via a single lightweight Docker container.
  developer: grimmdev
  icon: https://raw.githubusercontent.com/grimmdev/CalPal/refs/heads/main/assets/images/icon.png
  screenshot_link:
    - https://raw.githubusercontent.com/grimmdev/CalPal/refs/heads/main/assets/images/img1.png
    - https://raw.githubusercontent.com/grimmdev/CalPal/refs/heads/main/assets/images/img2.png
    - https://raw.githubusercontent.com/grimmdev/CalPal/refs/heads/main/assets/images/img3.png
  tagline:
    en_us: Fast, self-hosted scheduling alternative.
  title:
    en_us: CalPal
  index: /
  port_map: "8080"